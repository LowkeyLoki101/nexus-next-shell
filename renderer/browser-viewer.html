<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: file:; font-src 'self' data:; connect-src 'self' blob: data: https: http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; media-src 'self' blob: data: https: file:; frame-src 'self' blob: data: https: http://localhost:* http://127.0.0.1:*; object-src 'none'; base-uri 'none'; form-action 'self';" />
  <meta name="referrer" content="no-referrer" />
  <title>Emergent Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0e12; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #e0e0e0; }

    /* ── Navigation Bar ── */
    #nav-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 44px;
      padding: 0 10px;
      background: #18181f;
      border-bottom: 1px solid #2a2a35;
      -webkit-app-region: drag;
      user-select: none;
    }
    #nav-bar button, #nav-bar input { -webkit-app-region: no-drag; }

    .nav-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #b0b0c0;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .nav-btn:hover { background: #2a2a38; color: #fff; }
    .nav-btn:active { background: #3a3a48; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-btn:disabled:hover { background: transparent; color: #b0b0c0; }

    #url-bar {
      flex: 1;
      height: 30px;
      padding: 0 12px;
      border: 1px solid #2a2a35;
      border-radius: 6px;
      background: #0e0e12;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    #url-bar:focus { border-color: #5a7aff; }

    .screenshot-btn {
      background: linear-gradient(135deg, #3a6aff, #5a3aff);
      color: #fff;
      font-size: 12px;
      width: auto;
      padding: 0 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .screenshot-btn:hover { background: linear-gradient(135deg, #4a7aff, #6a4aff); }

    /* ── Loading indicator ── */
    #loading-bar {
      height: 2px;
      background: #5a7aff;
      width: 0%;
      transition: width 0.3s ease;
      position: absolute;
      top: 44px;
      left: 0;
      z-index: 10;
    }
    #loading-bar.active { width: 70%; }
    #loading-bar.done { width: 100%; transition: width 0.15s ease; }
    #loading-bar.hidden { opacity: 0; transition: opacity 0.3s ease; }

    /* ── Status bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 24px;
      padding: 0 12px;
      background: #18181f;
      border-top: 1px solid #2a2a35;
      font-size: 11px;
      color: #707080;
    }

    /* ── Webview fills remaining space ── */
    #browser-content {
      flex: 1;
      width: 100%;
      border: none;
    }

    #container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ── Screenshot flash ── */
    #flash-overlay {
      position: absolute;
      top: 44px;
      left: 0;
      right: 0;
      bottom: 24px;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.1s;
    }
    #flash-overlay.flash { opacity: 0.6; }

    /* ── Toast notification ── */
    #toast {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2a2a38;
      color: #e0e0e0;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 200;
      border: 1px solid #3a3a48;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div id="container">
    <div id="nav-bar">
      <button class="nav-btn" id="btn-back" title="Back" disabled>&#9664;</button>
      <button class="nav-btn" id="btn-forward" title="Forward" disabled>&#9654;</button>
      <button class="nav-btn" id="btn-reload" title="Reload">&#8635;</button>
      <input type="text" id="url-bar" placeholder="Enter URL..." spellcheck="false" />
      <button class="nav-btn" id="btn-go" title="Go">&#8594;</button>
      <button class="nav-btn screenshot-btn" id="btn-screenshot" title="Take Screenshot">&#128247; Capture</button>
    </div>

    <div id="loading-bar"></div>
    <div id="flash-overlay"></div>

    <webview id="browser-content" src="about:blank" allowpopups></webview>

    <div id="status-bar">
      <span id="status-text">Ready</span>
      <span id="status-url"></span>
    </div>

    <div id="toast"></div>
  </div>
  <script type="module" src="./src/browser-viewer.ts"></script>
</body>
</html>
