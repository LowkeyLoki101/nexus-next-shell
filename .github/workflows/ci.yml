name: shell-ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      # --- Gates that must pass for a shell release ---
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Verify capsule signature (Ed25519)
        run: node scripts/verify-capsule.mjs capsule/capsule.json capsule/public-key.pem

      # --- Informational until the per-mode parity passes land ---
      # The renderer/preload are ported verbatim from the monorepo, so strict
      # typecheck and full builds are reported but do not block shell CI yet.
      - name: Typecheck (informational)
        run: npm run typecheck --if-present
        continue-on-error: true

      - name: Web build (informational)
        run: npm run build:web
        continue-on-error: true

      - name: Electron build (informational)
        run: npm run build:electron
        continue-on-error: true
